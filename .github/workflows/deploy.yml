name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    name: Deploy to Ploi
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Trigger Ploi deploy webhook
        run: curl -s "${{ secrets.PLOI_DEPLOY_WEBHOOK }}"
